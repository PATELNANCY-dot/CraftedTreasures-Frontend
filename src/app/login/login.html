<html>
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/assets/images/logo1.png">
  <link rel="shortcut icon" href="/assets/images/logo1.png" type="image/x-icon">

  <title>Crafted Treasures | Login</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

</head>

<body>

  <div class="login-glass">

    <div class="Login-box">
      <button class="close-btn" (click)="close()"><i class="bi bi-x-lg"></i></button>
    </div>

    <div class="brand">
      <img src="/assets/images/logo1.png" alt="Crafted Treasures Logo">
      <h1>Crafted Treasures</h1>
      <span>Handmade • Heritage • Heart</span>
    </div>

    <div class="divider"></div>

    <h2>Treasure Inside → <i class="bi bi-box2-heart"></i></h2>

    <form (ngSubmit)="loginUser()">
      <div class="mb-3">
        <label>Email Address</label>
        <input [(ngModel)]="email" name="email" type="email" class="form-control" placeholder="Enter your email" required>
      </div>

      <div class="mb-3 position-relative">
        <label>Password</label>
        <input [(ngModel)]="password"
               name="password"
               [type]="hidePassword ? 'password' : 'text'"
               class="form-control"
               placeholder="Enter your password"
               required>

        <i class="bi"
           [ngClass]="hidePassword ? 'bi-eye' : 'bi-eye-slash'"
           (click)="hidePassword = !hidePassword"
           style="position: absolute; right: 10px; top: 38px; cursor: pointer;">
        </i>
      </div>


      <div class="text-end mb-3">
        <a href="#" data-bs-toggle="modal" data-bs-target="#forgotModal" (click)="step = 1">
          Forgot Password?
        </a>
      </div>

      <button type="submit" class="btn btn-login w-100">Login</button>
    </form>


  

    <div class="register-link">
      Don’t have an account?
      <a routerLink="/register">Register</a>
    </div>

  </div>

</body>
</html>


<!-- FORGOT PASSWORD MODAL -->

<div class="modal fade" id="forgotModal" tabindex="-1">

  <div class="modal-dialog modal-dialog-centered">

    <div class="modal-content p-4">

      <!-- STEP 1 EMAIL -->

      <div *ngIf="step === 1">

        <h3 class="mb-3">Forgot Password</h3>

        <input type="email"
               class="form-control mb-3"
               placeholder="Enter your email"
               [(ngModel)]="resetEmail">
        <button class="btn btn-dark w-100" (click)="sendOtp()" [disabled]="isLoading">

          <span *ngIf="!isLoading">Send OTP</span>

          <span *ngIf="isLoading" class="loader"></span>

        </button>

      </div>

      <!-- STEP 2 OTP -->

      <div *ngIf="step === 2">

        <h3 class="mb-3">Verify OTP</h3>

        <input type="text"
               class="form-control mb-3"
               placeholder="Enter OTP"
               [(ngModel)]="otp">

        <button class="btn btn-dark w-100 mb-2"
                (click)="verifyOtp()">
          Verify OTP
        </button>


        <button class="btn btn-outline-secondary w-100"
                (click)="resendOtp()"
                [disabled]="isResendingOtp">

          <span *ngIf="!isResendingOtp">Resend OTP</span>

          <span *ngIf="isResendingOtp" class="loader"></span>

        </button>

      </div>


    </div>

  </div>

</div>
