<div class="reset-page" *ngIf="email">




  <div class="reset-container">
    <div class="modal-close">
      <button type="button" class="close-btn" (click)="close()">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div class="reset-header">
      <i class="bi bi-shield-lock"></i>
      <h2>Reset Password</h2>
      <p>Create a strong new password for your account</p>
    </div>

    <form (ngSubmit)="resetPassword()">

      <div class="input-group">
        <i class="bi bi-lock"></i>

        <input [type]="hideNewPassword ? 'password' : 'text'"
               [(ngModel)]="newPassword"
               name="newPassword"
               placeholder="New Password"
               required />

        <i class="bi toggle-eye"
           [ngClass]="hideNewPassword ? 'bi-eye' : 'bi-eye-slash'"
           (click)="hideNewPassword = !hideNewPassword">
        </i>
      </div>


      <div class="input-group">
        <i class="bi bi-check2-circle"></i>

        <input [type]="hideConfirmPassword ? 'password' : 'text'"
               [(ngModel)]="confirmPassword"
               name="confirmPassword"
               placeholder="Confirm Password"
               required />

        <i class="bi toggle-eye"
           [ngClass]="hideConfirmPassword ? 'bi-eye' : 'bi-eye-slash'"
           (click)="hideConfirmPassword = !hideConfirmPassword">
        </i>
      </div>

      <button type="submit">
        Reset Password
      </button>

    </form>

  </div>

</div>
